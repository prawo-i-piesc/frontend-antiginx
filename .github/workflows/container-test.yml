name: Container Verification
run-name: >-
    ${{ 
        github.event_name == 'pull_request' 
        && format('Container Verification for CI: PR #{0} -> {1}', github.event.number, github.event.pull_request.title)
    }}

on:
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    container-ci-test:
        name: Testing
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
        - name: 📥 Git -- Checkout repository
          uses: actions/checkout@v6

        - name: 🐳 Docker -- Set up
          uses: docker/setup-buildx-action@v3

        - name: 🐳 Docker -- Build Image for Scanning
          uses: docker/build-push-action@v6
          with:
            context: .
            push: false
            load: true
            tags: ${{ github.repository }}:pr-${{ github.event.pull_request.number }}-test
            cache-from: type=gha
            cache-to: type=gha,mode=max

        - name: 🧪 Trivy -- Test Vuln, Secret, Misconfig -> Container Image
          uses: aquasecurity/trivy-action@0.35.0
          with:
            scan-type: image
            image-ref: ${{ github.repository }}:pr-${{ github.event.pull_request.number }}-test
            ignore-unfixed: true
            scanners: vuln,secret,misconfig
            vuln-type: os,library
            format: table
            severity: CRITICAL,HIGH,MEDIUM
            exit-code: '1'